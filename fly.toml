# fly.toml app configuration file generated for pantera-negra-app on 2025-01-XX
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pantera-negra-app'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'
  builder = 'docker'
  buildkit = true

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
