# MatFlow Landing Page — Fly.io config
app = 'matflow-landing'
primary_region = 'gru'

[build]
  dockerfile = 'packages/landing/Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
