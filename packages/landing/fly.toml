# MatFlow Landing Page — Fly.io
# Deploy: flyctl deploy --app matflow-landing --image registry.fly.io/matflow-landing:latest
app = 'matflow-landing'
primary_region = 'gru'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
